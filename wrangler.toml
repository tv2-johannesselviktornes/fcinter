# Cloudflare Pages configuration for the native signup form's D1 backend.
# See docs/signup-form-setup.md for the one-time setup steps.

name = "fcinter"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "fcinter-signups"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
